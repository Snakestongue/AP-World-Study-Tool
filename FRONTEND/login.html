<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>AP World Study Tool || Login</title>
        <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="parent">
            <header>
                <p class="special" id="headerSpecial">AP World Study Tool</p>
            </header>
            <nav>
                <p class="special" id="navSpecial">AP World Study Tool</p>
                <!-- <a href="../index.html"><img id="navIMG" src="../image.png"></a> -->
                <ul id="navList">
                    <li id="dropdownContainer">
                        <ul id="innerULNAV">
                            <li><a class="dropdown" id="home" href="../index.html">Home</a></li>
                            <li><a class="dropdown" id="login" href="login.html">Login</a></li>
                            <li><a class="dropdown" id="signUp" href="signup.html">Sign Up</a></li>
                            <li><a class="dropdown" id="faq" href="qAndA.html">FAQ</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
            <main>
                <div id = "loginCard">
                    <h1>Login to your account</h1>
                    <p id="loginUN" class="titleBackend">Username</p>
                    <input type="text" id="userName" placeholder="Username" class="logins">
                    <p id="loginPass" class="titleBackend">Password</p>
                    <input type="password" id="passWord" placeholder="Password" class="logins">
                    <br>
                    <button id="oLogin">Login</button>
                    <p>Don't have an account? <a href="signup.html" class="opposite">Sign up.</a></p>
                </div>
            </main>
          
        </div>
        <script src="scripting.js"></script>
        <script>
            let login = document.getElementById("login")
            let signUp = document.getElementById("signUp");
            let home = document.getElementById("home")
            let faq = document.getElementById("faq")
            let footerGithub = document.getElementById("github")
            let oLogBut = document.getElementById("oLogin")
            
            document.addEventListener("keypress", function(event) {
                if (event.key == "Enter") {
                    document.getElementById("oLogin").click();
                }
            });

            oLogBut.addEventListener("click", async function() {
                let username = document.getElementById("userName").value.trim();
                let password = document.getElementById("passWord").value.trim();
                if (!username || !password) {
                    alert("Please fill out all fields!");
                    return;
                }
                try{
                    const response = await fetch("/api/v1/users/login", { 
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });
                    const wait = await response.json();
                    if (response.ok) {
                        localStorage.setItem("userName", wait.user.user);
                        alert(wait.message);
                        window.location.href = "notes.html";
                    } else {
                        alert(wait.message);
                    }
                } catch (error) {
                    alert("Internal Server Error");
                }
            });
            
        </script>
    </body>
</html>
