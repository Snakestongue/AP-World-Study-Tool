<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>AP World Study Tool || Sign Up</title>
        <link rel="icon" href="/path/to/favicon.ico" type="image/x-icon">
        <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="parent">
            <header>
                <p class="special" id="headerSpecial">AP World Study Tool</p>
            </header>
            <nav>
                <a class="special" id="navSpecial" href="../index.html">AP World Study Tool</a>
                <!-- <a href="../index.html"><img id="navIMG" src="../image.png"></a> -->
                <ul id="navList">
                    <li id="dropdownContainer">
                        <ul id="innerULNAV">
                            <li><a class="dropdown" id="home" href="../index.html">Home</a></li>
                            <li><a class="dropdown" id="login" href="login.html">Login</a></li>
                            <li><a class="dropdown" id="signUp" href="signup.html">Sign Up</a></li>
                            <li><a class="dropdown" id="faq" href="qAndA.html">FAQ</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
            <main>
                <div id = "signUpCard">
                    <h1>Create your account</h1>
                    <p id="supUN" class="titleBackend">Username</p>
                    <input type="text" id="userName" placeholder="Username" class="logins">
                    <p id="supPASS" class="titleBackend">Password</p>
                    <input type="password" id="passWord" placeholder="Password" class="logins">
                    <p id="supEmail" class="titleBackend">Email</p>
                    <input type="email" id="eMail" placeholder="Email" class="logins">
                    <button id="oLogin">Sign up</button>
                    <div id="ppcheck">
                        <input id="pp" type="checkbox">
                        <label for="pp">I have read and agree to the <a id="ppLink"href="PP.html">Privacy Policy</a></label>
                    </div>
                    <p id="lSUP">Already have an account? <a href="login.html" class="opposite">Login.</a></p>
                </div>
            </main>
            <footer>
                <ul id="footerList">
                    <li><a id="github" href="https://github.com/Snakestongue">Github</a></li>
                    <li id="footerDisable" disabled>&copy; 2026 APWST by Maeher. All rights reserved. V2</li>
                </ul>
            </footer> 
        </div>
        <script src="scripting.js"></script>
        <script>
            let oLogBut = document.getElementById("oLogin")
            
            

            document.addEventListener("keypress", function(event) {
                if (event.key == "Enter") {
                    document.getElementById("oLogin").click();
                }
            });
            function startLoad(btn){
                btn.disabled = true;
                let spinner = document.createElement("span");
                spinner.style.display = "inline-block";
                spinner.style.width = "16px";
                spinner.style.height = "16px";
                spinner.style.marginLeft = "8px";
                spinner.style.border = "3px solid #ccc";
                spinner.style.borderTop = "3px solid #007BFF";
                spinner.style.borderRadius = "50%";
                btn.spinner = spinner;
                btn.appendChild(spinner);
                let angle = 0;
                btn.spinnerInterval = setInterval(()=>{
                    angle += 10;
                    spinner.style.transform = `rotate(${angle}deg)`;
                }, 100);
            }
            function stopLoad(btn){
                btn.disabled = false;
                if (btn.spinnerInterval){
                    clearInterval(btn.spinnerInterval);
                    btn.spinnerInterval = null;
                }
                if (btn.spinner){
                    btn.removeChild(btn.spinner);
                    btn.spinner = null;
                }
            }

            oLogBut.addEventListener("click", async function() {
                let username = document.getElementById("userName").value;
                let password = document.getElementById("passWord").value;
                let email = document.getElementById("eMail").value;
                let checkbox = document.getElementById("pp").checked;
                if (!username || !password || !email) {
                    alert("Please fill out all fields!");
                    return;
                }
                if (checkbox ==false){
                    alert("Please check if you have read and agreed to the Privacy Policy” ")
                    return;
                }
                if (password.length <6){
                    alert("Password must be 6 characters long")
                    return;
                }
                startLoad(this)
                try{
                    const response = await fetch("/api/v1/users/register", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password,
                            checkbox:checkbox
                        })
                    });
                    const wait = await response.json();
                    if (response.ok) {
                        localStorage.setItem("privacyPolicy", checkbox)
                        localStorage.setItem("userEmail", email);
                        localStorage.setItem("userName", wait.user.user);
                        window.location.href = "notes.html";
                    }else {
                        alert(wait.message);
                    }
                }catch (error) {
                    alert(wait.message);
                }
                stopLoad(this)
            });

        </script>
    </body>
</html>
