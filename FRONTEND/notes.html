<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>AP World Study Tool</title>
        <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="notesParent">
            <header>
                <p class="special" id="headerSpecial">AP World Study Tool</p>
            </header>
            <nav>
                <p class="special" id="navSpecial">AP World Study Tool</p>
                <!-- <a href="../index.html"><img id="navIMG" src="../image.png"></a> -->
                <ul id="navList">
                    <li id="dropdownContainer">
                        <ul id="innerULNAV">
                            <li><a class="dropdown" id="home" href="../index.html">Home</a></li>
                            <li><a class="dropdown" id="login" href="login.html">Login</a></li>
                            <li><a class="dropdown" id="signUp" href="signup.html">Sign Up</a></li>
                            <li><a class="dropdown" id="faq" href="qAndA.html">FAQ</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
            <main id="notesMAIN">
                <div id="overall">
                    <div class="lefts">
                        <select id="timePeriod">
                            <option disabled selected value="Select a Time Period">Select a Time Period</option>
                            <option value="1200-1450">Global Tapestry/Late Postclassical Era: 1200-1450 CE</option>
                            <option value="1450-1750">Land-Based Empires and Transoceanic Empires/Early Modern Era: 1450-1750 CE</option>
                            <option value="1750-1900">Revolutions and Consequences of Industrilization/The Long Nineteenth Century: 1750-1900 CE</option>
                            <option value="1900-2005">Global Conflict, Cold War, Decolonization, Globilization: 1900-2005 CE</option>
                        </select>
                        <h3 class="notesHeading">Content</h3>
                        <div id="textbox" class="boxes"contenteditable="true" >Start typing note...</div>
                    </div>

                    <div id="views">
                        <h3 class="notesHeading">View your notes</h3>
                        <div id="view" class="boxes">Click "Get Notes" to view notes...</div>
                    </div>
                </div>
            </main>
            <div id="sidebar">
                <input type="text" placeholder="username" class="button" id="usernameNotes" disabled>  
                <button class="button" id="saveButton">Save Notes</button>
                <button class="button" id="getButton">Get Notes</button>
                <button class="button" id="summerize">Summerize Notes</button>
                <button class="button" id="flashcard">Create Flashcards for Quizlet</button>
                <button class="button" id="MCQ">Create sample MCQ</button>
            </div>
        </div>
        <script src="scripting.js"></script>
        <script>
            
            let textBOX = document.getElementById("textbox");
            let view = document.getElementById("view");
            let username = document.getElementById("usernameNotes");
            let saveButton = document.getElementById("saveButton")
            let getButton = document.getElementById("getButton")
            let summerize = document.getElementById("summerize")
            let select = document.getElementById("timePeriod");
            let flashcard = document.getElementById("flashcard")
            let MCQ = document.getElementById("MCQ")
            let buttons = document.getElementsByClassName("button")
            let edits = false;

            function startLoad(btn){
                btn.disabled = true;
                let spinner = document.createElement("span");
                spinner.style.display = "inline-block";
                spinner.style.width = "16px";
                spinner.style.height = "16px";
                spinner.style.marginLeft = "8px";
                spinner.style.border = "3px solid #ccc";
                spinner.style.borderTop = "3px solid #007BFF";
                spinner.style.borderRadius = "50%";
                btn.spinner = spinner;
                btn.appendChild(spinner);
                let angle = 0;
                btn.spinnerInterval = setInterval(()=>{
                    angle += 10;
                    spinner.style.transform = `rotate(${angle}deg)`;
                }, 100);
            }
            function stopLoad(btn){
                btn.disabled = false;
                if (btn.spinnerInterval){
                    clearInterval(btn.spinnerInterval);
                    btn.spinnerInterval = null;
                }
                if (btn.spinner){
                    btn.removeChild(btn.spinner);
                    btn.spinner = null;
                }
            }
            window.onload = function(){
                let savedName = localStorage.getItem("userName");
                if (savedName){
                    document.getElementById("usernameNotes").value = savedName;
                }
            };
            summerize.addEventListener("click", async function (){  
                let content = textBOX.innerText;
                let selects = select.value;
                if (!content || content == "Start typing note..." || select.value=="Select a Time Period"){
                    alert("Please update text!");
                    stopLoad(this)
                    return;
                }
                startLoad(this)
                try {
                    const response = await fetch("/api/v1/users/generate", {
                        method: "POST",
                        headers: {"Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: content,
                            select: selects
                        })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        textBOX.innerText = data.result; 
                    } else {
                        alert("Failed: " + data.message);
                    }

                } catch (error) {
                    alert("Internal server error");
                }
                stopLoad(this)
            }); 

            flashcard.addEventListener("click", async function (){  
                let content = textBOX.innerText;
                let selects = select.value;
                if (!content || content == "Start typing note..." || select.value=="Select a Time Period"){
                    alert("Please update text!");
                    stopLoad(this)
                    return;
                }
                startLoad(this)
                try {
                    const response = await fetch("/api/v1/users/flashcard", {
                        method: "POST",
                        headers: {"Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: content,
                            select: selects
                        })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        textBOX.innerText = "Copy this content onto quizlet import. Customize it so each term/def is seperated by :: \n"+data.result; 
                    } else {
                        alert("Failed: " + data.message);
                    }
                }catch (error) {
                    alert("Internal server error");
                }
                stopLoad(this)
            });      
            
            MCQ.addEventListener("click", async function (){  
                let content = textBOX.innerText;
                let selects = select.value;
                if (!content || content == "Start typing note..." || select.value=="Select a Time Period"){
                    alert("Please update text!");
                    stopLoad(this)
                    return;
                }
                startLoad(this)
                try {
                    const response = await fetch("/api/v1/users/question", {
                        method: "POST",
                        headers: {"Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: content,
                            select: selects
                        })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        textBOX.innerText = data.result; 
                    } else {
                        alert("Failed: " + data.message);
                    }
                }catch (error) {
                    alert("Internal server error");
                }
                stopLoad(this)
            });  

            saveButton.addEventListener("click", async function(){
                let content = document.getElementById("textbox").innerText.trim();   
                let usernameNotes = username.value; 
                if (!content || !usernameNotes || select.value=="Select a Time Period") {
                    alert("Please fill out the textbox!");
                    stopLoad(this)
                    return;
                }
                if ( content=="Start typing note..."){
                    alert("Please update text!")
                    stopLoad(this)
                    return;
                }
                startLoad(this)
                try {
                    const response = await fetch("/api/v1/users/notes", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: usernameNotes,
                            content: content,
                            edit:edits
                        })
                    });
                    const wait = await response.json();
                    if (response.ok) {
                        alert("Notes posted");
                        textBOX.innerHTML = "Start typing note..."
                    }else {
                        alert("Failed: " + wait.message);
                    }
                }catch (error) {
                    alert("Internal issue");
                }
                stopLoad(this)
            });
            getButton.addEventListener("click", async function(){
                let usernameNotes = username.value;
                startLoad(this)
                try{
                    const response = await fetch(`/api/v1/users/notes?username=${usernameNotes}`, { 
                        method: "GET"
                    });
                    const data = await response.json(); 
                    if (response.ok){
                        view.innerHTML = ""; 
                        data.notes.forEach(note => {
                            view.innerHTML += `
                                <p>${note.content.replace(/\n/g, "<br>")}</p>
                            `;                            
                        });
                         alert("Notes uploaded")
                    }else {
                        alert("Failed to retrieve notes: " + data.message);
                    }
                }catch (error) {
                    alert("Internal issue");
                }
                stopLoad(this)
            });
        </script>
    </body>
</html>
